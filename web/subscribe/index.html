<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebBrain Cloud Subscribe</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://webbrain.one/subscribe/">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #0b0e17;
      color: #e4e4ec;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
      line-height: 1.6;
    }
    main { max-width: 520px; text-align: center; }
    .brand {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 22px;
      color: #a78bfa;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.1;
    }
    p {
      margin: 0 auto 18px;
      color: #a7adbd;
      font-size: 16px;
    }
    a {
      color: #a78bfa;
      font-weight: 700;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .spinner {
      width: 30px;
      height: 30px;
      margin: 26px auto;
      border: 3px solid rgba(167, 139, 250, 0.25);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <div class="brand">WebBrain Cloud</div>
    <h1 id="subscribe-title">Redirecting to Stripe</h1>
    <p id="subscribe-copy">The payment page will open in a few seconds.</p>
    <p id="checkout-row">If redirect does not work, <a id="checkout-link" href="https://buy.stripe.com/bJebJ13at2kc5XP7eY8g00a">open Stripe checkout</a>.</p>
    <div class="spinner" aria-hidden="true"></div>
  </main>
  <script>
    const checkoutUrl = new URL("https://buy.stripe.com/bJebJ13at2kc5XP7eY8g00a");
    const clientReferenceId = new URLSearchParams(window.location.search).get('client_reference_id');
    if (clientReferenceId) {
      checkoutUrl.searchParams.set('client_reference_id', clientReferenceId);
      document.getElementById('checkout-link').href = checkoutUrl.toString();
      setTimeout(function () {
        window.location.href = checkoutUrl.toString();
      }, 3500);
    } else {
      document.getElementById('subscribe-title').textContent = 'Open this link from WebBrain';
      document.getElementById('subscribe-copy').textContent = 'This subscribe link is missing a device id. Open the subscribe link returned by WebBrain after a quota message.';
      document.getElementById('checkout-row').style.display = 'none';
    }
  </script>
</body>
</html>
